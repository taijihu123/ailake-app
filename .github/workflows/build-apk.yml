name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22 (Capacitor 要求)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install frontend dependencies
        working-directory: ./source/ailake-app
        run: npm install --legacy-peer-deps

      - name: Build web app
        working-directory: ./source/ailake-app
        run: npm run build

      - name: Set up JDK 17 (Android 编译要求)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: 同步 Capacitor 资源（保留现有 Android 配置）
        working-directory: ./source/ailake-app
        run: |
          npx cap sync android

      - name: Restore keystore file
        working-directory: ./source/ailake-app
        run: |
          echo "${{ secrets.KEY_STORE_FILE }}" | base64 -d > android/app/ailake_key.jks

      - name: Build APK
        working-directory: ./source/ailake-app/android
        run: ./gradlew assembleRelease --stacktrace
        env:
          KEY_STORE_FILE: ailake_key.jks
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: ailake-release-apk
          path: source/ailake-app/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22 (Capacitor 要求)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install frontend dependencies
        working-directory: ./source/ailake-app
        run: npm install --legacy-peer-deps

      - name: Build web app
        working-directory: ./source/ailake-app
        run: npm run build

      - name: Set up JDK 17 (Android 编译要求)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: 同步 Capacitor 资源
        working-directory: ./source/ailake-app
        run: |
          npx cap sync android

      - name: Debug - Show build.gradle content
        working-directory: ./source/ailake-app
        run: |
          cat android/app/build.gradle

      - name: Build APK (无签名测试)
        working-directory: ./source/ailake-app/android
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: ailake-debug-apk
          path: source/ailake-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30